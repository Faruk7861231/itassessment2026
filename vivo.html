<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Vivo Store | Faruk Mobile Tech</title>
</head>
<body>
    <nav>
        <div class="logo">Faruk Mobile Tech</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="brand.html">Brand</a>
            <a href="iphone.html">iPhone</a>
            <a href="samsung.html">Samsung</a>
            <a href="vivo.html">Vivo</a>
            <a href="oneplus.html">OnePlus</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="container">
        
        <h1>Vivo Smart Collection</h1>
        <input type="text" id="searchPhones" class="search-box" placeholder="Vivo model search karein...">
        
        <div class="product-grid">
            <div class="product-card">
                <img src="vivo-x100.jpg" alt="Vivo V29">
                <h3>Vivo V29</h3>
                <p class="price">₹32,999</p>
                <button class="buy-btn" onclick="buyProduct('Vivo V29')">Buy Now</button>
            </div>
            <div class="product-card">
                <img src="vivo-x100pro.jpg" alt="Vivo V27">
                <h3>Vivo V27</h3>
                <p class="price">₹30,999</p>
                <button class="buy-btn" onclick="buyProduct('Vivo V27')">Buy Now</button>
            </div>
            <div class="product-card">
                <img src="vivo-x200.jpg" alt="Vivo X100">
                <h3>Vivo X100 Pro</h3>
                <p class="price">₹89,999</p>
                <button class="buy-btn" onclick="buyProduct('Vivo X100 Pro')">Buy Now</button>
            </div>
            <div class="product-card">
                <img src="vivo-x200pro.jpg" alt="Vivo Y200">
                <h3>Vivo Y200</h3>
                <p class="price">₹21,999</p>
                <button class="buy-btn" onclick="buyProduct('Vivo Y200')">Buy Now</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
