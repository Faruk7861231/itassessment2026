<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>OnePlus Store | Faruk Mobile Tech</title>
</head>
<body>
    <nav>
        <div class="logo">Faruk Mobile Tech</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="brand.html">Brand</a>
            <a href="iphone.html">iPhone</a>
            <a href="samsung.html">Samsung</a>
            <a href="vivo.html">Vivo</a>
            <a href="oneplus.html">OnePlus</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="container">
         <!--This is a samsung-->
        <h1>OnePlus: Never Settle</h1>
        <input type="text" id="searchPhones" class="search-box" placeholder="OnePlus model search karein...">
        
        <div class="product-grid">
            <div class="product-card">
                <img src="oneplus-13.jpg" alt="OnePlus 12">
                <h3>OnePlus 12</h3>
                <p class="price">₹64,999</p>
                <button class="buy-btn" onclick="buyProduct('OnePlus 12')">Buy Now</button>
            </div>
            <div class="product-card">
                <img src="oneplus-14.jpg" alt="OnePlus 11">
                <h3>OnePlus 11</h3>
                <p class="price">₹54,999</p>
                <button class="buy-btn" onclick="buyProduct('OnePlus 11')">Buy Now</button>
            </div>
            <div class="product-card">
                <img src="oneplus-15.jpg" alt="OnePlus Nord 3">
                <h3>OnePlus Nord 3</h3>
                <p class="price">₹29,999</p>
                <button class="buy-btn" onclick="buyProduct('OnePlus Nord 3')">Buy Now</button>
            </div>
            <div class="product-card">
                <img src="oneplus-16.jpg" alt="OnePlus 10 Pro">
                <h3>OnePlus 10 Pro</h3>
                <p class="price">₹49,999</p>
                <button class="buy-btn" onclick="buyProduct('OnePlus 10 Pro')">Buy Now</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
